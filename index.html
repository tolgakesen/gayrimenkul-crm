<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GayriMenkul CRM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="description" content="Gayrimenkul danışmanı portföy ve müşteri yönetim sistemi">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Leaflet Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <link rel="stylesheet" href="css/main.css?v=20260427">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="login-screen">
    <div class="login-card" style="text-align:center;gap:1rem">
      <div class="spinner" style="margin:0 auto"></div>
      <p style="color:var(--color-text-muted);margin:0">Bağlanıyor...</p>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div id="login-content"></div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app-layout" style="display:none">
    <!-- Sidebar -->
    <aside id="sidebar"></aside>
    <div id="sidebar-overlay"></div>

    <!-- Main -->
    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
      <header id="topbar">
        <button type="button" class="topbar-menu-btn btn-icon" id="sidebar-toggle">
          <i data-lucide="menu"></i>
        </button>
        <a href="#/" class="topbar-title">GayriMenkul CRM</a>
        <div class="topbar-spacer"></div>
        <div class="topbar-info" id="topbar-info">
          <div class="topbar-kur">
            <span class="kur-item"><span class="kur-lbl">USD</span><span id="kur-usd">—</span></span>
            <span class="kur-dot">·</span>
            <span class="kur-item"><span class="kur-lbl">EUR</span><span id="kur-eur">—</span></span>
          </div>
        </div>
        <div class="topbar-clock" id="topbar-clock">
          <span id="topbar-date"></span>
          <span id="topbar-time"></span>
        </div>
        <a href="#/reminders" class="notif-btn" title="Hatırlatıcılar">
          <i data-lucide="bell"></i>
          <span id="notif-badge" style="display:none">0</span>
        </a>
      </header>
      <main id="main-wrapper">
        <div id="main-content">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </main>
    </div>
  </div>

  <!-- SheetJS for Excel import -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script type="module" src="js/app.js?v=20260424"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();
    });
    (function initTopbarInfo() {
      console.log('[KUR] 1-iife çalıştı');
      var uEl = document.getElementById('kur-usd');
      var eEl = document.getElementById('kur-eur');
      console.log('[KUR] 2-elementler:', uEl, eEl);

      async function fetchRates() {
        console.log('[KUR] 3-fetch başlıyor');
        try {
          var res = await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY,EUR');
          var d = await res.json();
          console.log('[KUR] 4-frankfurter yanıtı:', d);
          if (d.rates && d.rates.TRY) {
            uEl.textContent = d.rates.TRY.toFixed(2);
            eEl.textContent = (d.rates.TRY / d.rates.EUR).toFixed(2);
            console.log('[KUR] 5-güncellendi:', uEl.textContent, eEl.textContent);
            return;
          }
        } catch(e) { console.error('[KUR] frankfurter hata:', e); }
        try {
          var res2 = await fetch('https://open.er-api.com/v6/latest/USD');
          var d2 = await res2.json();
          console.log('[KUR] 4b-openER yanıtı:', d2.result, 'TRY:', d2.rates && d2.rates.TRY);
          if (d2.rates && d2.rates.TRY) {
            uEl.textContent = d2.rates.TRY.toFixed(2);
            eEl.textContent = (d2.rates.TRY / d2.rates.EUR).toFixed(2);
            console.log('[KUR] 5b-güncellendi:', uEl.textContent, eEl.textContent);
          }
        } catch(e2) { console.error('[KUR] openER hata:', e2); }
      }
      fetchRates();
      setInterval(fetchRates, 5 * 60 * 1000);
    })();

    (function initTopbarClock() {
      const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
      const MONTHS = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
      function tick() {
        const now = new Date();
        const dateEl = document.getElementById('topbar-date');
        const timeEl = document.getElementById('topbar-time');
        if (!dateEl || !timeEl) return;
        dateEl.textContent = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        timeEl.textContent = h + ':' + m + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
