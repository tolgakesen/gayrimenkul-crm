<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GayriMenkul CRM</title>
  <meta name="description" content="Gayrimenkul danışmanı portföy ve müşteri yönetim sistemi">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar"></aside>
    <div id="sidebar-overlay"></div>

    <!-- Main -->
    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
      <header id="topbar">
        <button class="topbar-menu-btn btn-icon" id="sidebar-toggle">
          <i data-lucide="menu"></i>
        </button>
        <a href="#/" class="topbar-title">GayriMenkul CRM</a>
        <div class="topbar-spacer"></div>
        <a href="#/reminders" class="notif-btn" title="Hatırlatıcılar">
          <i data-lucide="bell"></i>
          <span id="notif-badge" style="display:none">0</span>
        </a>
      </header>
      <main id="main-wrapper">
        <div id="main-content">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Init lucide after DOM ready
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>
