<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GayriMenkul CRM</title>
  <meta name="description" content="Gayrimenkul danışmanı portföy ve müşteri yönetim sistemi">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Leaflet Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="css/main.css?v=20260420b">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div id="login-content"></div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app-layout" style="display:none">
    <!-- Sidebar -->
    <aside id="sidebar"></aside>
    <div id="sidebar-overlay"></div>

    <!-- Main -->
    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
      <header id="topbar">
        <button class="topbar-menu-btn btn-icon" id="sidebar-toggle">
          <i data-lucide="menu"></i>
        </button>
        <a href="#/" class="topbar-title">GayriMenkul CRM</a>
        <div class="topbar-spacer"></div>
        <div class="topbar-clock" id="topbar-clock">
          <span id="topbar-date"></span>
          <span id="topbar-time"></span>
        </div>
        <a href="#/reminders" class="notif-btn" title="Hatırlatıcılar">
          <i data-lucide="bell"></i>
          <span id="notif-badge" style="display:none">0</span>
        </a>
        <button id="btn-admin-login" class="topbar-admin-btn" title="Yönetici girişi yap">
          <i data-lucide="shield-check"></i>
          <span>Admin Girişi</span>
        </button>
      </header>
      <main id="main-wrapper">
        <div id="main-content">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </main>
    </div>
  </div>

  <!-- WhatsApp Float Button -->
  <a href="https://wa.me/905356170481" target="_blank" rel="noopener" class="whatsapp-float" title="WhatsApp ile ulaşın">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 3C8.82 3 3 8.82 3 16c0 2.39.63 4.63 1.73 6.57L3 29l6.63-1.73A12.94 12.94 0 0016 29c7.18 0 13-5.82 13-13S23.18 3 16 3z" fill="#fff"/>
      <path d="M16 5.5A10.5 10.5 0 0 0 5.5 16c0 1.99.55 3.86 1.52 5.45L6 26l4.7-1.52A10.46 10.46 0 0 0 16 26.5 10.5 10.5 0 0 0 26.5 16 10.5 10.5 0 0 0 16 5.5zm5.16 14.4c-.22.6-1.27 1.16-1.75 1.2-.44.04-.86.2-2.9-.6-2.45-.96-4-3.45-4.12-3.61-.12-.16-.97-1.29-.97-2.46 0-1.17.61-1.74.83-1.98.22-.24.48-.3.64-.3l.46.01c.15.01.35-.06.54.42.2.5.69 1.68.75 1.8.06.12.1.27.02.43-.08.16-.12.26-.24.4-.12.14-.25.31-.36.42-.12.12-.24.25-.1.49.14.24.62 1.02 1.33 1.65.92.82 1.69 1.07 1.93 1.19.24.12.38.1.52-.06.14-.16.6-.7.76-.94.16-.24.32-.2.54-.12.22.08 1.4.66 1.64.78.24.12.4.18.46.28.06.1.06.57-.16 1.17z" fill="#25D366"/>
    </svg>
  </a>

  <script type="module" src="js/app.js?v=20260420b"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();
    });
    (function initTopbarClock() {
      const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
      const MONTHS = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
      function tick() {
        const now = new Date();
        const dateEl = document.getElementById('topbar-date');
        const timeEl = document.getElementById('topbar-time');
        if (!dateEl || !timeEl) return;
        dateEl.textContent = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        timeEl.textContent = h + ':' + m + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
