function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function iso(daysAgo = 0) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString();
}

function dateStr(daysAgo = 0) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}

const FIRST_NAMES = ['Ahmet','Mehmet','Mustafa','Ali','Hüseyin','Hasan','İbrahim','Murat','Ömer','Yusuf','Emre','Burak','Serkan','Tolga','Kemal','Ayşe','Fatma','Zeynep','Emine','Hatice','Merve','Esra','Selin','Ece','Buse','Derya','Gülşen','Sibel','Nilüfer','Pınar','Ceren','Elif','Tuğba','Büşra','Rabia'];
const LAST_NAMES  = ['Yılmaz','Kaya','Demir','Şahin','Çelik','Yıldız','Arslan','Öztürk','Koç','Polat','Aydın','Güneş','Yıldırım','Kılıç','Erdoğan','Aslan','Kaplan','Doğan','Keskin','Çetin','Güler','Acar','Şimşek','Özcan','Karakaş','Demirci','Uzun','Kurt','Öz','Bulut'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const copy = [...arr]; const result = [];
  for (let i = 0; i < n && copy.length; i++) { const idx = Math.floor(Math.random() * copy.length); result.push(...copy.splice(idx, 1)); }
  return result;
}
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function phone() { return `05${rnd(30,59)} ${rnd(100,999)} ${rnd(10,99)}${rnd(10,99)}`; }
function email(fn, ln) { return `${fn.toLowerCase().replace(/[ğüşıöçİĞÜŞÖÇ]/g, c => ({'ğ':'g','ü':'u','ş':'s','ı':'i','ö':'o','ç':'c','İ':'i','Ğ':'g','Ü':'u','Ş':'s','Ö':'o','Ç':'c'}[c]||c))}${ln.toLowerCase().replace(/[ğüşıöçİĞÜŞÖÇ]/g, c => ({'ğ':'g','ü':'u','ş':'s','ı':'i','ö':'o','ç':'c','İ':'i','Ğ':'g','Ü':'u','Ş':'s','Ö':'o','Ç':'c'}[c]||c))}${rnd(1,99)}@${pick(['gmail.com','hotmail.com','yahoo.com','outlook.com'])}`; }
function bdStr() { return `${rnd(1960,1998)}-${String(rnd(1,12)).padStart(2,'0')}-${String(rnd(1,28)).padStart(2,'0')}`; }

const budgetRanges = [
  [2000000, 4000000], [4000000, 7000000], [7000000, 12000000],
  [12000000, 20000000], [20000000, 50000000],
  [15000, 25000], [25000, 40000], [40000, 80000]
];

const CLIENTS = Array.from({ length: 100 }, (_, i) => {
  const fn = pick(FIRST_NAMES);
  const ln = pick(LAST_NAMES);
  const brange = pick(budgetRanges);
  const daysAgo = rnd(1, 365);
  return {
    id: uuid(),
    createdAt: iso(daysAgo),
    updatedAt: iso(Math.floor(daysAgo / 2)),
    firstName: fn,
    lastName: ln,
    phone: phone(),
    email: email(fn, ln),
    notes: i % 5 === 0 ? 'Acil karar verme durumu var. Yakından takip edilmeli.' : (i % 7 === 0 ? 'Kredi onayı bekleniyor.' : ''),
    occupation: pick(OCCS),
    birthday: rnd(0, 1) ? bdStr() : null,
    segment: SEGMENTS[i % SEGMENTS.length],
    source: SOURCES[i % SOURCES.length],
    pipelineStage: STAGES[i % STAGES.length],
    pipelineHistory: [],
    noteLog: [],
    budgetMin: brange[0],
    budgetMax: brange[1],
    preferredDistricts: pickN(DISTRICTS, rnd(1, 3)),
    preferredNeighborhoods: [],
    desiredFeatures: pickN(['balkon','otopark','asansör','güvenlik','havuz'], rnd(0, 3)),
    desiredRoomCounts: pickN(ROOMS, rnd(1, 2)),
    desiredMinM2: rnd(50, 100),
    desiredMaxM2: rnd(100, 250),
    clientType: TYPES[i % TYPES.length],
    priorityLevel: PRIOS[i % PRIOS.length],
    firstMeetingDate: dateStr(daysAgo),
    declaredIncome: rnd(0, 1) ? rnd(20, 200) * 1000 : null,
    creditStatus: pick(CREDITS),
    decisionStage: pick(DECISIONS),
    listingTypePreference: pick(LTYPES),
    matchWeights: { budget: 40, location: 30, squareMeters: 15, roomCount: 10, features: 5 },
    meetingHistory: [],
    shownPropertyIds: [],
  };
});

function loadSeedData() {
  try {
    const existingProps = JSON.parse(localStorage.getItem('gm_crm_properties') || '[]');
    const existingClients = JSON.parse(localStorage.getItem('gm_crm_clients') || '[]');

    const mergedProps = [...PROPERTIES, ...existingProps];
    const mergedClients = [...CLIENTS, ...existingClients];

    localStorage.setItem('gm_crm_properties', JSON.stringify(mergedProps));
    localStorage.setItem('gm_crm_clients', JSON.stringify(mergedClients));

    document.getElementById('result').innerHTML =
      `<div class="result ok">✅ Başarıyla yüklendi!<br>${PROPERTIES.length} portföy + ${CLIENTS.length} müşteri eklendi.<br><br>3 saniye içinde uygulamaya yönlendiriliyorsunuz...</div>`;
    setTimeout(() => { window.location.href = 'index.html'; }, 3000);
  } catch(e) {
    document.getElementById('result').innerHTML = `<div class="result err">❌ Hata: ${e.message}</div>`;
  }
}

function clearAll() {
  if (!confirm('Tüm veriler silinecek. Emin misiniz?')) return;
  localStorage.removeItem('gm_crm_properties');
  localStorage.removeItem('gm_crm_clients');
  localStorage.removeItem('gm_crm_reminders');
  localStorage.removeItem('gm_crm_activity');
  document.getElementById('result').innerHTML = `<div class="result ok">🗑️ Tüm veriler silindi.</div>`;
}
</script>
</body>
</html>
